name: Build iOS App
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18.x
      - run: npm install -g eas-cli
      - run: npm install
      - run: eas build -p ios --non-interactive
